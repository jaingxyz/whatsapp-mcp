name: Semgrep

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 4 * * 1"

permissions:
  contents: read

jobs:
  semgrep:
    name: SAST scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0

      - name: Run Semgrep CI
        run: semgrep ci --config p/javascript --config p/security-audit --config p/owasp-top-ten
