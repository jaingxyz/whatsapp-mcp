name: Dependabot auto-merge
# Enables GitHub auto-merge on Dependabot PRs. The merge only happens once the
# branch's required status checks pass; if CI fails (e.g. an incompatible
# dependency bump), the PR stays open. Requires repo setting "Allow auto-merge"
# and branch protection with required checks on the default branch.
on: pull_request_target

# Default the workflow token to read-only; grant write only on the job below.
permissions:
  contents: read

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge (squash)
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
