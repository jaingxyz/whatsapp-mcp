version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    # Wait 7 days after a release before proposing it, so a compromised
    # or broken publish has time to be caught (supply-chain hardening).
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    groups:
      production-minor-and-patch:
        dependency-type: production
        update-types:
          - minor
          - patch
      development-minor-and-patch:
        dependency-type: development
        update-types:
          - minor
          - patch
    labels:
      - dependencies
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    # Wait 7 days after a release before proposing it, so a compromised
    # or broken publish has time to be caught (supply-chain hardening).
    cooldown:
      default-days: 7
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore
      include: scope
